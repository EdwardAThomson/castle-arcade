<!doctype html>
<html lang="en-GB">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#15161b">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<title>CastlePalm</title>
<style>
html,body{height:100%;margin:0;
  background:#15161b;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
  font:13px system-ui,sans-serif;color:#cdd2da;
  user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;-webkit-tap-highlight-color:transparent;
  overscroll-behavior:none}
/* cartridge selector — visible above the device on mobile (no hidden top bar) */
#cartbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center;width:100%;max-width:512px;box-sizing:border-box;padding:0 8px}
#cartsel{flex:1;min-width:120px;background:#2a2c34;color:#e8eaf0;border:1px solid #454852;border-radius:6px;padding:8px 10px;font:15px system-ui,sans-serif;cursor:pointer}
#cartbar .load{background:#2a2c34;color:#e8eaf0;border:1px solid #454852;border-radius:6px;padding:8px 12px;cursor:pointer;white-space:nowrap}
#cartbar .load input{display:none}
#cartbar .tv{color:#9fd0ff;text-decoration:none;border:1px solid #3a4d6a;border-radius:6px;padding:8px 12px;white-space:nowrap;background:none;cursor:pointer;font:inherit}
#now{flex-basis:100%;text-align:center;opacity:.6;min-height:0}
#d{position:relative;width:512px;height:826px;background:url(castle_palm.png) 0 0/100% 100% no-repeat;border-radius:14px;
  touch-action:none;-webkit-touch-callout:none}
#s{position:absolute;left:68px;top:85px;width:376px;height:263px;background:#000;image-rendering:pixelated;
  touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
#l{position:absolute;left:64px;top:63px;width:11px;height:11px;border-radius:50%;background:#2a0506;opacity:.85}
#l.on{background:#ff2e3b;box-shadow:0 0 4px 1px #e60021}
b{position:absolute;touch-action:none;display:block}
body.debug b{outline:2px solid rgba(255,40,60,.9);background:rgba(255,40,60,.12)}
body.debug #s{outline:2px solid rgba(40,140,255,.9)}
</style>

<div id="cartbar">
  <select id="cartsel">
    <option value="pong">Pong</option>
    <option value="snake">Snake</option>
    <option value="palmblast">PalmBlast</option>
    <option value="gryphon">Gryphon Ascent</option>
    <option value="oathbound">Oathbound</option>
  </select>
  <label class="load" title="Load a .cpc cartridge from disk">Load… <input type="file" id="file" accept=".cpc,.cplm,application/octet-stream"></label>
  <button id="fs" class="tv" title="Fullscreen (hides the browser bars)">⛶</button>
  <a class="tv" href="console.html" title="CastleStation — the TV-console version: big screen, 2-player. Same cartridges.">📺 TV</a>
  <span id="now"></span>
</div>

<div id="d">
  <canvas id="s" width="320" height="224" draggable="false"></canvas>
  <i id="l"></i>

  <!-- D-pad: Up=1 Down=2 Left=4 Right=8 (generous, non-overlapping touch targets) -->
  <b data-b="1"   style="left:90px;top:505px;width:48px;height:72px"></b>
  <b data-b="2"   style="left:90px;top:600px;width:48px;height:45px"></b>
  <b data-b="4"   style="left:48px;top:551px;width:42px;height:46px"></b>
  <b data-b="8"   style="left:138px;top:551px;width:44px;height:46px"></b>

  <!-- Face buttons (SNES diamond): X top, Y left, A right, B bottom -->
  <b data-b="64"  style="left:360px;top:499px;width:51px;height:49px;border-radius:50%"></b><!-- X -->
  <b data-b="128" style="left:303px;top:552px;width:51px;height:49px;border-radius:50%"></b><!-- Y -->
  <b data-b="16"  style="left:416px;top:551px;width:52px;height:52px;border-radius:50%"></b><!-- A -->
  <b data-b="32"  style="left:359px;top:602px;width:52px;height:52px;border-radius:50%"></b><!-- B -->

  <!-- START=256  POWER=512 (taller hit areas — the pills are short) -->
  <b data-b="256" style="left:148px;top:690px;width:74px;height:40px;border-radius:12px"></b>
  <b data-b="512" style="left:255px;top:690px;width:74px;height:40px;border-radius:12px"></b>
</div>

<script src="dist/castlepalm.js?v=26"></script>
<script>
'use strict'
// CastlePalm handheld shell. Boots a CPLM cartridge on the real CPU+PPU+input bus.
const W = 320, H = 224
const screen = document.getElementById('s')
const ctx = screen.getContext('2d', { alpha: false })
const image = ctx.createImageData(W, H)
const out = new Uint32Array(image.data.buffer)
const led = document.getElementById('l')
const cartsel = document.getElementById('cartsel'), now = document.getElementById('now')

let sys = null, cartBytes = null, input = 0, power = 1

// Web Audio (host-side; core stays deterministic). Needs a user gesture to start.
let actx = null, playTime = 0
function unlockAudio() {
  if (!actx) { const AC = window.AudioContext || window.webkitAudioContext; if (!AC) return; actx = new AC(); playTime = actx.currentTime }
  if (actx.state === 'suspended') actx.resume()
}
function playAudio(samples, rate) {
  if (!actx || actx.state !== 'running') return
  const buf = actx.createBuffer(1, samples.length, rate); buf.copyToChannel(samples, 0)
  const src = actx.createBufferSource(); src.buffer = buf; src.connect(actx.destination)
  if (playTime < actx.currentTime) playTime = actx.currentTime
  src.start(playTime); playTime += buf.duration
}

function blank() { ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H) }
function boot(bytes) { cartBytes = bytes; sys = new CastlePalm.System(bytes); power = 1; led.className = 'on' }
function pick(name) {
  if (!(window.CastlePalm && CastlePalm.carts && CastlePalm.carts[name])) return
  boot(CastlePalm.carts[name]); cartsel.value = name; now.textContent = ''
}
cartsel.onchange = () => pick(cartsel.value)
document.getElementById('file').onchange = e => {
  const f = e.target.files[0]; if (!f) return
  const r = new FileReader()
  r.onload = () => { try { boot(new Uint8Array(r.result)); now.textContent = '▸ ' + f.name } catch (err) { now.textContent = 'load failed: ' + err.message } }
  r.readAsArrayBuffer(f)
}

// boot embedded cart (no fetch -> runs from file://). #snake / #palmblast select.
if (window.CastlePalm && CastlePalm.carts) { const h = location.hash.replace('#', ''); pick(CastlePalm.carts[h] ? h : 'pong') }
else { blank(); led.className = ''; now.textContent = 'bundle not loaded — run "npm run bundle", then hard-refresh' }

// 16-bit input word matches the MMIO INPUT layout (MMIO_V0.md)
const BTN = { POWER: 512 }
function setBit(bit, down) {
  if (down) unlockAudio()
  if (bit === BTN.POWER) {
    if (down && !(input & BTN.POWER)) {
      power ^= 1; led.className = power ? 'on' : ''
      if (power) { if (cartBytes) sys = new CastlePalm.System(cartBytes) } else blank()
    }
  }
  input = down ? input | bit : input & ~bit
}

const MAP = { ArrowUp: 1, w: 1, W: 1, ArrowDown: 2, s: 2, S: 2, ArrowLeft: 4, a: 4, A: 4, ArrowRight: 8, d: 8, D: 8,
  z: 16, j: 16, x: 32, k: 32, c: 64, i: 64, v: 128, l: 128, Enter: 256, Backspace: 512 }
onkeydown = e => { const b = MAP[e.key]; if (b) { e.preventDefault(); setBit(b, true) } if (e.key === '`') document.body.classList.toggle('debug')
  if (e.key === '1') pick('pong'); if (e.key === '2') pick('snake'); if (e.key === '3') pick('palmblast') }
onkeyup = e => { const b = MAP[e.key]; if (b) { e.preventDefault(); setBit(b, false) } }

for (const el of document.querySelectorAll('b')) {
  const bit = +el.dataset.b
  // Capture the pointer so a held finger that drifts off the button keeps it
  // pressed (a console d-pad/button is held to move). Release only on up/cancel —
  // NOT on pointerleave, which on touch fires mid-hold and dropped inputs.
  el.addEventListener('pointerdown', e => { e.preventDefault(); try { el.setPointerCapture(e.pointerId) } catch (_) {} setBit(bit, true) })
  el.addEventListener('pointerup', e => { e.preventDefault(); setBit(bit, false) })
  el.addEventListener('pointercancel', () => setBit(bit, false))
}
if (location.hash === '#debug') document.body.classList.add('debug')

// kill the mobile long-press "save image" / context menu (it interrupted gameplay)
document.addEventListener('contextmenu', e => e.preventDefault())
screen.ondragstart = screen.onselectstart = e => e.preventDefault()

// drag-and-drop a .cpc cartridge
screen.ondragover = e => e.preventDefault()
screen.ondrop = e => {
  e.preventDefault()
  const f = new FileReader()
  f.onload = () => boot(new Uint8Array(f.result))
  f.readAsArrayBuffer(e.dataTransfer.files[0])
}

// fixed 60 Hz step — games assume 60fps, so don't run faster on 120Hz+ displays
let acc = 0, last
function frame(t) {
  requestAnimationFrame(frame)
  if (!power || !sys) return
  if (last === undefined) last = t
  acc += t - last; last = t
  if (acc > 250) acc = 250                 // clamp after a stall / backgrounding
  let drew = false
  while (acc >= 16.6667) {
    acc -= 16.6667
    sys.setInput(input)
    out.set(sys.runFrame()); drew = true
    if (sys.audio) playAudio(sys.audio, sys.audioRate)
  }
  if (drew) ctx.putImageData(image, 0, 0)
}
blank(); requestAnimationFrame(frame)

// fullscreen toggle (Android Chrome hides the URL/nav bars; iOS uses Add to Home Screen)
document.getElementById('fs').onclick = () => {
  const d = document
  if (d.fullscreenElement || d.webkitFullscreenElement) { (d.exitFullscreen || d.webkitExitFullscreen).call(d) }
  else { const e = d.documentElement; (e.requestFullscreen || e.webkitRequestFullscreen || (() => {})).call(e) }
  setTimeout(fit, 250)
}

// scale the device to fill the viewport. Use the LARGEST height the browser
// reports (innerHeight under-reports on some mobile browsers, which shrank the
// device); recompute on every event that can change the viewport.
function fit() {
  const vh = Math.max(innerHeight, document.documentElement.clientHeight, window.visualViewport ? visualViewport.height : 0)
  const barH = document.getElementById('cartbar').offsetHeight + 14
  document.getElementById('d').style.zoom = Math.min(1, innerWidth / 512, (vh - barH) / 826)
}
addEventListener('resize', fit); addEventListener('orientationchange', fit); addEventListener('load', fit)
if (window.visualViewport) visualViewport.addEventListener('resize', fit)
fit()
</script>
</html>
